                    function writeTerm(text, className = '') {
                        const div = document.createElement('div');
                        if(className) div.className = className;
                        div.innerHTML = text;
                        t.appendChild(div);
                        window.scrollTo(0, document.body.scrollHeight);
                    }

                    async function type(lines, className = '') {
                        for(let line of lines) {
                            let currentText = "";
                            const div = document.createElement('div');
                            if(className) div.className = className;
                            t.appendChild(div);

                        }
                    }

                    function showMuralha() {
                        setTimeout(() => {
                            t.style.display = 'none';
                            m.style.display = 'block';
                        }, 1000);
                    }

                    function base64ToUint8Array(base64) {
                        const binaryString = atob(base64);
                        const len = binaryString.length;
                        const bytes = new Uint8Array(len);
                        for (let i = 0; i < len; i++) {
                            bytes[i] = binaryString.charCodeAt(i);
                        }
                        return bytes;
                    }

                    async function deriveKey(password, salt) {
                        const encoder = new TextEncoder();
                        const baseKey = await crypto.subtle.importKey("raw", encoder.encode(password), "PBKDF2", false, ["deriveKey"]);
                        return crypto.subtle.deriveKey(
                            { name: "PBKDF2", salt: salt, iterations: 100000, hash: "SHA-256" },
                            baseKey,
                            { name: "AES-GCM", length: 256 },
                            false,
                            ["decrypt"]
                        );
                    }

                    async function decryptPayload(encryptedObj, password) {
                        const decoder = new TextDecoder();
                        const ciphertext = base64ToUint8Array(encryptedObj.ciphertext);
                        const iv = base64ToUint8Array(encryptedObj.iv);
                        const salt = base64ToUint8Array(encryptedObj.salt);
                        
                        const key = await deriveKey(password, salt);
                        const decrypted = await crypto.subtle.decrypt(
                            { name: "AES-GCM", iv: iv },
                            key,
                            ciphertext
                        );
                        return decoder.decode(decrypted);
                    }
